services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - codegen-net

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - LLM_MODEL=qwen3.5:9b
      - APP_PORT=8080
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - codegen-net

volumes:
  ollama_data:

networks:
  codegen-net:
    driver: bridge

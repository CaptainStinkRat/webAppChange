<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeGen — AI Code Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 24px;
    }
    header h1 { font-size: 20px; font-weight: 600; color: #f0f6fc; }
    header p { font-size: 13px; color: #8b949e; margin-top: 4px; }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
    }
    /* ── Chat log ──────────────────────────────────────────────── */
    #chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 400px;
    }
    .message {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 16px;
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .message.system { border-left: 3px solid #58a6ff; background: #0d1117; }
    .message.step {
      border-left: 3px solid #3fb950;
      font-size: 13px;
      color: #7ee787;
      padding: 8px 14px;
    }
    .message.approval {
      border-left: 3px solid #d29922;
      background: #1c2128;
    }
    /* ── Code block ────────────────────────────────────────────── */
    .code-block {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
    }
    .code-block .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      font-size: 12px;
      color: #8b949e;
    }
    .code-block pre {
      padding: 14px;
      overflow-x: auto;
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', monospace;
      font-size: 13px;
      line-height: 1.5;
      color: #c9d1d9;
    }
    .code-block .copy-btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 3px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .code-block .copy-btn:hover { background: #30363d; }
    /* ── Approval buttons ─────────────────────────────────────── */
    .approval-area {
      display: none;
      padding: 16px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      gap: 10px;
      align-items: flex-start;
      flex-direction: column;
    }
    .approval-area.visible { display: flex; }
    .approval-area p { font-size: 14px; color: #e3b341; margin-bottom: 8px; }
    .approval-actions { display: flex; gap: 10px; }
    .approval-area textarea {
      width: 100%;
      min-height: 60px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      padding: 8px;
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
    }
    .btn {
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .btn-approve { background: #238636; color: #fff; }
    .btn-approve:hover { background: #2ea043; }
    .btn-reject { background: #da3633; color: #fff; }
    .btn-reject:hover { background: #f85149; }
    /* ── Input area ───────────────────────────────────────────── */
    #input-area {
      display: flex;
      gap: 10px;
      padding: 16px 0;
      border-top: 1px solid #30363d;
      margin-top: 12px;
    }
    #prompt-input {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
      min-height: 44px;
    }
    #prompt-input:focus { outline: none; border-color: #58a6ff; }
    #send-btn {
      background: #238636;
      border: none;
      color: #fff;
      padding: 0 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    #send-btn:hover { background: #2ea043; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    /* ── Spinner ──────────────────────────────────────────────── */
    .spinner { display: none; }
    .spinner.visible { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner::after {
      content: "⏳";
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body>
  <header>
    <h1>🧠 CodeGen</h1>
    <p>AI code generator with human review — powered by LangGraph + Ollama</p>
  </header>

  <main>
    <div id="chat-log"></div>

    <div id="input-area">
      <textarea id="prompt-input" rows="2" placeholder="Describe the code you want to generate…"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </main>

  <script>
    // ── State ──────────────────────────────────────────────────────
    let currentSessionId = null;
    let eventSource = null;
    let pendingApproval = false;

    const chatLog = document.getElementById('chat-log');
    const promptInput = document.getElementById('prompt-input');
    const sendBtn = document.getElementById('send-btn');

    // ── Helpers ────────────────────────────────────────────────────
    function addMessage(content, className = '') {
      const div = document.createElement('div');
      div.className = 'message ' + (className || '');
      const md = content
        .replace(/### (.+)/g, '<strong>$1</strong>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
      div.innerHTML = md;
      chatLog.appendChild(div);
      chatLog.scrollTop = chatLog.scrollHeight;
      return div;
    }

    function addStep(content) {
      return addMessage(content, 'step');
    }

    function addCode(code, label = 'Generated code') {
      const wrapper = document.createElement('div');
      wrapper.className = 'code-block';
      wrapper.innerHTML = `
        <div class="header">
          <span>${label}</span>
          <button class="copy-btn" onclick="copyCode(this)">Copy</button>
        </div>
        <pre><code>${escapeHtml(code)}</code></pre>
      `;
      chatLog.appendChild(wrapper);
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function copyCode(btn) {
      const pre = btn.closest('.code-block').querySelector('pre');
      navigator.clipboard.writeText(pre.textContent).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 1500);
      });
    }

    function showApprovalArea() {
      pendingApproval = true;
      let area = document.getElementById('approval-area');
      if (!area) {
        area = document.createElement('div');
        area.id = 'approval-area';
        area.className = 'approval-area';
        area.innerHTML = `
          <p>✋ Human review required</p>
          <div style="width:100%">
            <textarea id="feedback-input" placeholder="Optional: provide feedback for rejection…"></textarea>
          </div>
          <div class="approval-actions">
            <button class="btn btn-approve" onclick="handleApprove()">✅ Approve & Test</button>
            <button class="btn btn-reject" onclick="handleReject()">🔄 Reject & Revise</button>
          </div>
        `;
        chatLog.appendChild(area);
      }
      area.classList.add('visible');
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function hideApprovalArea() {
      pendingApproval = false;
      const area = document.getElementById('approval-area');
      if (area) area.classList.remove('visible');
    }

    // ── API calls ──────────────────────────────────────────────────
    async function startGeneration(prompt) {
      hideApprovalArea();
      sendBtn.disabled = true;

      addMessage(`**You:** ${prompt}`, 'system');

      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ prompt }),
      });
      const data = await response.json();
      if (data.error) {
        addMessage('Error: ' + data.error, 'system');
        sendBtn.disabled = false;
        return;
      }

      currentSessionId = data.session_id;
      connectSSE(currentSessionId);
    }

    function connectSSE(sessionId) {
      if (eventSource) {
        eventSource.close();
      }

      eventSource = new EventSource(`/api/stream?session=${sessionId}`);

      eventSource.addEventListener('message', (e) => {
        const data = JSON.parse(e.data);
        // generic message handler
        if (data.content) addMessage(data.content);
        if (data.code) addCode(data.code, 'Generated code');
      });

      eventSource.addEventListener('step', (e) => {
        const data = JSON.parse(e.data);
        if (data.content) addStep(data.content);
      });

      eventSource.addEventListener('code', (e) => {
        const data = JSON.parse(e.data);
        addCode(data.code, data.content || 'Generated code');
      });

      eventSource.addEventListener('approval_needed', (e) => {
        const data = JSON.parse(e.data);
        addMessage(data.content, 'approval');
        showApprovalArea();
      });

      eventSource.addEventListener('test_result', (e) => {
        const data = JSON.parse(e.data);
        addMessage('**Test Plan:**\n\n' + data.content);
      });

      eventSource.addEventListener('error', (e) => {
        const data = JSON.parse(e.data);
        addMessage('❌ Error: ' + data.error, 'system');
        eventSource.close();
        sendBtn.disabled = false;
      });

      eventSource.addEventListener('done', () => {
        eventSource.close();
        sendBtn.disabled = false;
      });
    }

    async function handleApprove() {
      if (!currentSessionId || !pendingApproval) return;

      hideApprovalArea();
      addStep('✅ Approved — running tests…');

      const response = await fetch('/api/approve', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ session_id: currentSessionId }),
      });
      const data = await response.json();
      if (data.error) addMessage('Error: ' + data.error, 'system');
    }

    async function handleReject() {
      if (!currentSessionId || !pendingApproval) return;

      const feedback = document.getElementById('feedback-input')?.value || '';
      hideApprovalArea();
      addStep('🔄 Rejected — revising with feedback…');

      const response = await fetch('/api/reject', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ session_id: currentSessionId, feedback }),
      });
      const data = await response.json();
      if (data.error) addMessage('Error: ' + data.error, 'system');
    }

    // ── Events ─────────────────────────────────────────────────────
    sendBtn.addEventListener('click', () => {
      const prompt = promptInput.value.trim();
      if (!prompt) return;
      promptInput.value = '';
      startGeneration(prompt);
    });

    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
      }
    });

    // ── Welcome message ────────────────────────────────────────────
    addMessage('Welcome to **CodeGen**! Describe the code you want to generate and I\'ll produce it with a plan, review, and test plan for your approval.', 'system');
  </script>
</body>
</html>
